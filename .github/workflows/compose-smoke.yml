name: Compose Smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare smoke environment
        shell: bash
        run: |
          mkdir -p artifacts
          python - <<'PY'
          from pathlib import Path

          env_path = Path(".env.ci")
          payload = {
            "OPS_PLATFORM_API_PORT": "8000",
            "OPS_PLATFORM_DB_PATH": "/app/artifacts/ops_platform.sqlite3",
            "OPS_PLATFORM_AUTO_INIT_STORAGE": "true",
            "OPS_PLATFORM_AUTH_ENABLED": "true",
            "OPS_PLATFORM_API_KEYS": "ci-smoke-token",
            "OPS_PLATFORM_RATE_LIMIT_ENABLED": "true",
            "OPS_PLATFORM_RATE_LIMIT_BACKEND": "memory",
            "OPS_PLATFORM_ENABLE_TRACING": "false",
          }

          env_path.write_text(
            "\n".join(f"{key}={value}" for key, value in payload.items()) + "\n",
            encoding="utf-8",
          )
          PY

      - name: Validate docker-compose config
        run: docker compose --env-file .env.ci -f docker-compose.smoke.yml config

      - name: Build compose images
        run: docker compose --env-file .env.ci -f docker-compose.smoke.yml build

      - name: Run compose smoke check
        run: |
          python scripts/smoke_docker_stack.py \
            --compose-file docker-compose.smoke.yml \
            --env-file .env.ci \
            --project-name ci-smoke \
            --skip-build \
            --timeout-seconds 300 \
            --keep-up \
            --summary-path artifacts/ci-smoke-summary.json

      - name: Capture compose state
        if: always()
        shell: bash
        run: |
          docker compose --env-file .env.ci -f docker-compose.smoke.yml -p ci-smoke ps > artifacts/compose-ps.txt || true
          docker compose --env-file .env.ci -f docker-compose.smoke.yml -p ci-smoke logs --no-color > artifacts/compose-logs.txt || true

      - name: Tear down compose stack
        if: always()
        run: docker compose --env-file .env.ci -f docker-compose.smoke.yml -p ci-smoke down -v

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-smoke-artifacts
          if-no-files-found: ignore
          path: |
            artifacts/ci-smoke-summary.json
            artifacts/compose-ps.txt
            artifacts/compose-logs.txt
